name: Update Stock Data

on:
  schedule:
    # Every 30 min during market hours (IST 9:15-15:30 = UTC 3:45-10:00), Mon-Fri
    - cron: "*/30 3-10 * * 1-5"
    # End of day summary at 4 PM IST = 10:30 UTC
    - cron: "30 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch stocks and generate data
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/fetch_stocks.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json
          git diff --staged --quiet || git commit -m "chore: update stock data $(date -u +%Y-%m-%dT%H:%M)"
          git push
